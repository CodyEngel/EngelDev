name: API CI/CD
defaults:
  run:
    working-directory: api

on:
  push:
    paths:
      - api/**
      - .github/workflows/api-ci-cd.yml

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v2
      - name: Set up JDK 17
        uses: actions/setup-java@v2
        with:
          java-version: "17"
          distribution: "microsoft"
          cache: gradle
      - name: Run Unit Tests
        run: ./gradlew test --no-daemon
      - name: Publishing Unit Test Results
        uses: mikepenz/action-junit-report@v2
        if: always()
        with:
          report_paths: '**/build/test-results/test/TEST-*.xml'

  linter:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v2
      - name: Set up JDK 17
        uses: actions/setup-java@v2
        with:
          java-version: "17"
          distribution: "microsoft"
          cache: gradle
      - name: Run Kotlin Linter
        run: ./gradlew detekt --no-daemon

  deploy:
    runs-on: ubuntu-latest
    needs: [test, linter]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v2
      - uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'
      - uses: google-github-actions/setup-gcloud@v2
      - name: Build API
        run: gcloud builds submit --tag gcr.io/cody-engel-landing/api .
      - name: Deploy API
        run: gcloud run deploy api --image gcr.io/cody-engel-landing/api --platform managed --region us-central1
